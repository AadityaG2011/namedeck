<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>NameDeck</title>
<meta name="theme-color" content="#0f1420" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="NameDeck" />
<style>
:root {
  --card: #ffffff; --ink: #1a2233; --muted: #7a869a; --accent: #5B8DEF; --line: #e7ebf2;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
/* Reserve the scrollbar's space so it appearing/disappearing (on zoom, pause, etc.)
   never changes the layout width and resizes the image. */
html { scrollbar-gutter: stable; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #f4f6fb; color: var(--ink);
}
/* Phones / installed PWA: the app fills the whole screen — no mockup frame. */
.phone {
  display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh;
  background: #f4f6fb; overflow: hidden;
}
/* Pad by the device safe-area insets (notch/status bar, home indicator) so nothing hides
   under the iPhone bezel; the fallbacks keep it at a plain 12px in browsers with no insets. */
#app { flex: 1; display: flex; flex-direction: column;
  padding: calc(12px + env(safe-area-inset-top, 0px)) calc(12px + env(safe-area-inset-right, 0px))
           env(safe-area-inset-bottom, 12px) calc(12px + env(safe-area-inset-left, 0px)); }
.screen { position: relative; flex: 1; min-height: 0; display: flex; flex-direction: column; }

/* Wider screens: show it inside a centered phone mockup for a desktop preview. */
@media (min-width: 480px) {
  body {
    display: flex; justify-content: center; padding: 24px 12px; min-height: 100vh;
    background: radial-gradient(120% 80% at 50% -10%, #1b2740 0%, #0f1420 60%);
  }
  .phone {
    width: 100%; max-width: 390px; min-height: 720px; border-radius: 34px;
    box-shadow: 0 24px 60px rgba(0,0,0,.45), inset 0 0 0 8px #000;
  }
}

/* Icon buttons — roster (left) and settings (right) live in the bottom bar. */
.iconbtn {
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
  border: none; border-radius: 50%; background: none; color: var(--ink); cursor: pointer;
}
.iconbtn:active { transform: scale(.94); }

.close { border: none; background: none; font-size: 22px; line-height: 1; color: var(--muted);
  cursor: pointer; padding: 0 6px; }

/* Settings controls — white cards on the gray sheet body, like the roster rows. */
.control { background: var(--card); border-radius: 12px; padding: 12px 14px;
  box-shadow: 0 1px 4px rgba(20,30,60,.08); }
.control + .control { margin-top: 10px; }
.control label { display: block; font-size: 14px; color: var(--muted); margin-bottom: 8px; }
.control label b { color: var(--ink); }
.control input[type=range] { width: 100%; accent-color: var(--accent); }

/* Card fills the screen; the image is the star. */
.card {
  flex: 1; display: flex; flex-direction: column;
  background: var(--card); border-radius: 22px; padding: 10px; text-align: center;
  box-shadow: 0 8px 26px rgba(20,30,60,.10); cursor: pointer;
}
.avatar { flex: 1; min-height: 0; position: relative; display: flex; align-items: center; justify-content: center; }
/* Empty state — shown in the card when no students have been added yet. */
.empty-deck { display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; padding: 24px; text-align: center; }
.empty-title { font-size: 20px; font-weight: 800; color: var(--ink); }
.empty-sub { font-size: 14px; color: var(--muted); line-height: 1.5; max-width: 240px; }
.empty-deck .btn { margin-top: 6px; }
/* Fill the whole avatar area (absolutely, so no image can grow the layout); `contain`
   shows the entire photo as large as it fits, letterboxing where the shape differs. */
.avatar .photo, .avatar svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  border-radius: 16px; box-shadow: 0 4px 14px rgba(0,0,0,.12);
}
.avatar .photo { object-fit: contain; background: #e7ebf2; }
/* Fixed height so the image above doesn't shift when the name replaces the hint. */
.name-slot { flex: 0 0 auto; height: 80px; display: flex; flex-direction: column;
  justify-content: center; padding: 8px 0 4px; }
.waiting { color: #c3ccdb; font-size: 15px; letter-spacing: .3px; }
.name { font-size: 30px; font-weight: 800; animation: pop .22s ease; }
@keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* Frequency selector (how often the current student appears) — shown while paused. */
.freq { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 0 0; }
.freq[hidden] { display: none; }
.freq-label { font-size: 12px; color: var(--muted); }
.freq-picker { display: inline-flex; flex-direction: column; gap: 2px; }
.freq-seg { display: flex; background: #e7ebf2; border-radius: 10px; padding: 2px; gap: 2px; }
.freq-opt { flex: 1; border: none; background: none; color: var(--muted); cursor: pointer; font: inherit;
  min-width: 34px; padding: 5px 8px; border-radius: 8px; font-size: 13px; font-weight: 600; }
.freq-opt.active { background: var(--card); color: var(--ink); box-shadow: 0 1px 3px rgba(20,30,60,.15); }
.freq-scale { display: flex; justify-content: space-between; padding: 0 5px; }
.freq-scale span { font-size: 10.5px; color: var(--muted); }

/* Playback controls (pause/continue + prev/next) below the card. */
/* Bottom bar: roster (left) | transport (center) | settings (right). */
.controls { flex: 0 0 auto; position: relative; z-index: 7; height: 68px;
  display: flex; align-items: center; justify-content: space-between; padding: 0 6px; }
.controls[hidden] { display: none; }
.transport { display: flex; align-items: center; gap: 22px; }
.transport[hidden] { display: none; }
.ctrl { border: none; background: none; color: var(--ink); cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  width: 48px; height: 48px; border-radius: 50%; }
.ctrl:disabled { opacity: .28; cursor: default; }
.ctrl:not(:disabled):active { transform: scale(.94); }
.ctrl.play { width: 58px; height: 58px; background: var(--ink); color: #fff;
  box-shadow: 0 4px 14px rgba(20,30,60,.25); }

/* Roster/settings panels — fill from the top down to just above the bottom bar, so the
   roster/settings buttons in that bar stay visible (to switch panels or close). */
.sheet {
  position: absolute; top: 0; right: 0; bottom: 68px; left: 0; z-index: 6;
  display: flex; flex-direction: column;
  background: #f4f6fb; border-radius: 22px; overflow: hidden;
  box-shadow: 0 6px 18px rgba(20,30,60,.12);
}
.sheet[hidden] { display: none; }
.sheet-head, .sheet-foot { display: flex; align-items: center; padding: 14px 16px; background: var(--card); }
.sheet-head { justify-content: space-between; box-shadow: 0 1px 0 var(--line); }
.sheet-head span { font-weight: 800; font-size: 17px; }
.sheet-foot { justify-content: flex-end; gap: 10px; box-shadow: 0 -1px 0 var(--line); }
.sheet-body { flex: 1; overflow-y: auto; padding: 14px 16px; }
.hint { color: var(--muted); font-size: 13px; line-height: 1.5; margin: 0 0 10px; }
#nameInput { width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px;
  font: inherit; resize: vertical; }
#addNames { width: 100%; margin-top: 10px; }
.add-actions { display: flex; gap: 8px; margin-top: 8px; }
.add-actions .btn { flex: 1; text-align: center; }
#importGoogle { width: 100%; margin-top: 8px; }
.import-hint { margin: 5px 0 0; font-size: 11.5px; color: var(--muted); text-align: center; }
.import-status { margin: 8px 0 0; padding: 8px 10px; border-radius: 10px; font-size: 12.5px;
  line-height: 1.45; background: #eef1f7; color: var(--ink); }
.import-status[hidden] { display: none; }
.import-status.ok { background: #e7f6ec; color: #1b7a3d; }
.import-status.error { background: #fdecdc; color: #9a3412; }
.notice { margin: 10px 0 0; padding: 8px 10px; border-radius: 10px; font-size: 12.5px;
  line-height: 1.45; color: #9a3412; background: #fdecdc; }
.notice[hidden] { display: none; }

.btn { border: none; border-radius: 12px; padding: 10px 14px; font: inherit; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink); box-shadow: 0 1px 4px rgba(20,30,60,.12); }
.btn:active { transform: scale(.98); }
.btn.primary { background: var(--ink); color: #fff; }
.btn.ghost { background: transparent; box-shadow: none; color: var(--muted); }
.btn.tiny { padding: 6px 10px; font-size: 13px; font-weight: 500; }
.btn.danger { background: #d1453b; color: #fff; }

/* In-app confirmation dialog (for Clear All / Reset All). */
.modal { position: absolute; inset: 0; z-index: 10; display: flex; align-items: center;
  justify-content: center; padding: 24px; background: rgba(15,20,32,.45); }
.modal[hidden] { display: none; }
.modal-card { width: 100%; max-width: 300px; background: var(--card); border-radius: 18px;
  padding: 20px; box-shadow: 0 16px 40px rgba(20,30,60,.30); }
.modal-msg { margin: 0 0 16px; font-size: 15px; line-height: 1.5; color: var(--ink); text-align: center; }
.modal-actions { display: flex; gap: 10px; }
.modal-actions .btn { flex: 1; text-align: center; }

.roster-list { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
.empty { color: var(--muted); font-size: 13px; text-align: center; padding: 18px 8px; }
.rrow { display: flex; align-items: center; gap: 8px; background: var(--card); border-radius: 12px;
  padding: 6px 8px; box-shadow: 0 1px 4px rgba(20,30,60,.08); }
.rthumb { flex: 0 0 44px; width: 44px; height: 44px; border-radius: 9px; overflow: hidden;
  background: #e7ebf2; display: flex; align-items: center; justify-content: center; }
.rthumb img, .rthumb svg { width: 100%; height: 100%; object-fit: cover; }
.rname { flex: 1; min-width: 0; border: 1px solid transparent; border-radius: 8px; padding: 6px 8px;
  font: inherit; background: transparent; }
.rname[readonly] { cursor: default; }
.rname:not([readonly]) { border-color: var(--accent); outline: none; background: #fff; }
.pick { flex: 0 0 auto; }
.remove { flex: 0 0 auto; color: var(--muted); font-size: 16px; line-height: 1; padding: 6px 9px; }
</style>
</head>
<body>
  <div class="phone"><div id="app"></div></div>
  <script>
/* ===== src/core/avatar.js ===== */
// avatar.js — deterministic procedural avatars.
//
// Generates a distinct, repeatable SVG face from a seed string. Same seed -> same face.
// This stands in for a real photo in the prototype so we never handle a real person's
// image. In the native app, this is replaced by the (locally stored) student photo.

window.NameDeck = window.NameDeck || {};

(function () {
  // Simple deterministic string hash -> 32-bit int.
  function hash(str) {
    let h = 2166136261;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  // Seeded pseudo-random generator (mulberry32).
  function rng(seedInt) {
    let a = seedInt;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const BG        = ['#5B8DEF', '#EF7A5B', '#3FB68B', '#B65BEF', '#EFC15B', '#5BC7EF', '#EF5B9C', '#7A8B99'];
  const SKIN      = ['#F2D3B3', '#E5B98E', '#C68642', '#8D5524', '#5C3A21', '#FFE0BD'];
  const HAIR      = ['#2B2B2B', '#4A2E19', '#7A4B1E', '#B8860B', '#8B0000', '#D9D9D9', '#1A1A1A'];
  const pick = (arr, r) => arr[Math.floor(r() * arr.length)];

  // Returns an SVG string for the given seed.
  NameDeck.avatar = function (seed, size) {
    size = size || 160;
    const r = rng(hash(seed));
    const bg = pick(BG, r);
    const skin = pick(SKIN, r);
    const hair = pick(HAIR, r);
    const hairStyle = Math.floor(r() * 4); // 0 short, 1 flat-top, 2 curly, 3 bald-ish
    const hasBeard = r() > 0.6;
    const eyeType = Math.floor(r() * 3);
    const browRaise = r() > 0.5 ? -2 : 0;

    // Face geometry (viewBox 100x100)
    const cx = 50, cy = 54, fr = 26; // face center + radius

    let hairSvg = '';
    if (hairStyle === 0) {
      hairSvg = `<path d="M24 46 Q50 8 76 46 Q76 30 50 24 Q24 30 24 46 Z" fill="${hair}"/>`;
    } else if (hairStyle === 1) {
      hairSvg = `<rect x="24" y="22" width="52" height="20" rx="6" fill="${hair}"/>`;
    } else if (hairStyle === 2) {
      hairSvg = `<g fill="${hair}">
        <circle cx="30" cy="34" r="9"/><circle cx="42" cy="26" r="10"/>
        <circle cx="58" cy="26" r="10"/><circle cx="70" cy="34" r="9"/>
        <circle cx="50" cy="24" r="10"/></g>`;
    } else {
      hairSvg = `<path d="M26 42 Q50 30 74 42 Q70 34 50 32 Q30 34 26 42 Z" fill="${hair}" opacity="0.9"/>`;
    }

    const beardSvg = hasBeard
      ? `<path d="M${cx-fr+4} ${cy+6} Q${cx} ${cy+fr+12} ${cx+fr-4} ${cy+6} Q${cx} ${cy+fr} ${cx-fr+4} ${cy+6} Z" fill="${hair}" opacity="0.85"/>`
      : '';

    let eyesSvg;
    if (eyeType === 0) {
      eyesSvg = `<circle cx="41" cy="52" r="3" fill="#222"/><circle cx="59" cy="52" r="3" fill="#222"/>`;
    } else if (eyeType === 1) {
      eyesSvg = `<rect x="38" y="50" width="7" height="4" rx="2" fill="#222"/><rect x="55" y="50" width="7" height="4" rx="2" fill="#222"/>`;
    } else {
      eyesSvg = `<path d="M38 52 Q41 49 44 52" stroke="#222" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                 <path d="M56 52 Q59 49 62 52" stroke="#222" stroke-width="2.4" fill="none" stroke-linecap="round"/>`;
    }

    const browsSvg = `<path d="M37 ${46+browRaise} q4 -2 8 0" stroke="${hair}" stroke-width="2" fill="none" stroke-linecap="round"/>
                      <path d="M55 ${46+browRaise} q4 -2 8 0" stroke="${hair}" stroke-width="2" fill="none" stroke-linecap="round"/>`;

    const smile = r() > 0.5;
    const mouthSvg = smile
      ? `<path d="M43 64 Q50 71 57 64" stroke="#7a3b2e" stroke-width="2.4" fill="none" stroke-linecap="round"/>`
      : `<path d="M44 66 L56 66" stroke="#7a3b2e" stroke-width="2.4" fill="none" stroke-linecap="round"/>`;

    return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="avatar">
      <defs><clipPath id="cl-${hash(seed)}"><rect width="100" height="100" rx="16"/></clipPath></defs>
      <g clip-path="url(#cl-${hash(seed)})">
        <rect width="100" height="100" fill="${bg}"/>
        <circle cx="${cx}" cy="88" r="34" fill="#ffffff" opacity="0.18"/>
        <circle cx="${cx}" cy="${cy}" r="${fr}" fill="${skin}"/>
        ${beardSvg}
        <ellipse cx="${cx-fr+2}" cy="${cy+2}" rx="4" ry="6" fill="${skin}"/>
        <ellipse cx="${cx+fr-2}" cy="${cy+2}" rx="4" ry="6" fill="${skin}"/>
        ${hairSvg}
        ${browsSvg}
        ${eyesSvg}
        ${mouthSvg}
      </g>
    </svg>`;
  };
})();


/* ===== src/core/roster-store.js ===== */
// roster-store.js — persistence adapter for the teacher's OWN roster.
//
// The rest of the app treats a roster as a plain array of student objects
// ({ id, preferredName, photo, avatarSeed }); this module is the only place that
// knows *where* that array is kept. In the web prototype it lives in localStorage
// as JSON (photos are small downscaled data URLs). In the native app this boundary
// is swapped for on-device storage — so it's intentionally web-specific and thin.
//
// Every call is wrapped: localStorage can be missing, blocked (opaque origin), or
// over quota. On any failure we degrade quietly and the app falls back to the sample.

window.NameDeck = window.NameDeck || {};

(function () {
  var KEY = 'namedeck.roster.v1';
  var SEEDED_KEY = 'namedeck.seeded.v1'; // set once the first-run demo roster has been placed

  NameDeck.rosterStore = {
    load: function () {
      try {
        var raw = localStorage.getItem(KEY);
        var list = raw ? JSON.parse(raw) : [];
        return Array.isArray(list) ? list : [];
      } catch (e) {
        return [];
      }
    },
    save: function (list) {
      try {
        localStorage.setItem(KEY, JSON.stringify(list));
        return true;
      } catch (e) {
        return false; // unavailable or over quota — kept in memory for this session only
      }
    },
    clear: function () {
      try { localStorage.removeItem(KEY); } catch (e) { /* nothing to do */ }
    },
    // Has the one-time demo roster already been seeded? Used so we place it only on the very
    // first launch and never re-add it after the user clears or edits their roster.
    seeded: function () {
      try { return localStorage.getItem(SEEDED_KEY) === '1'; } catch (e) { return false; }
    },
    markSeeded: function () {
      try { localStorage.setItem(SEEDED_KEY, '1'); } catch (e) { /* nothing to do */ }
    }
  };
})();

/* ===== src/ui/google-import.js ===== */
// google-import.js — optional "Import from Google" using Google Sign-In + the Picker with
// the narrow `drive.file` scope (per-file access only; no full-Drive access, no security audit).
//
// Flow: sign in (drive.file) -> Picker to select the responses spreadsheet AND the photos ->
// read the sheet (name + photo file ID per row) -> download each photo by ID -> hand back
// [{ preferredName, blob }] matched by file ID. Private (the teacher's own auth) and stored
// on-device by the app. The Google client libraries are loaded lazily on first use, so the
// app stays dependency-free and offline-capable until this feature is actually used.
//
// SETUP (only you can do this — see README "Google import"): create a Google Cloud project,
// enable the Picker API + Drive API, make an OAuth Client ID (Web) and an API key, then paste
// them below. Until both are filled in, the button explains it isn't configured yet.

window.NameDeck = window.NameDeck || {};

(function () {
  // ---- Paste your Google Cloud credentials here ----
  var CLIENT_ID = '905358747786-rs954olnn8q7sn51igv6sp21pdbu7ugg.apps.googleusercontent.com';
  var API_KEY = 'AIzaSyAk84A3wN67i4OW-BjuHHUiliiFpO90vf4';
  // --------------------------------------------------

  var SCOPE = 'https://www.googleapis.com/auth/drive.file';
  var FOLDER_MIME = 'application/vnd.google-apps.folder';
  var NAME_HEADER = 'Preferred Full Name';   // must match your form's name question title
  var PHOTO_HEADER = 'Your Photo';           // must match your form's photo question title

  var pickerReady = false, tokenClient = null, accessToken = null;

  function configured() { return !!CLIENT_ID && !!API_KEY; }

  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      var s = document.createElement('script');
      s.src = src; s.async = true; s.defer = true;
      s.onload = resolve;
      s.onerror = function () { reject(new Error('Could not load ' + src)); };
      document.head.appendChild(s);
    });
  }

  // Load Google Identity Services (auth) + gapi (Picker), once.
  function ensureLibs() {
    if (pickerReady) return Promise.resolve();
    return Promise.all([
      loadScript('https://accounts.google.com/gsi/client'),
      loadScript('https://apis.google.com/js/api.js')
    ]).then(function () {
      return new Promise(function (resolve) {
        gapi.load('picker', function () { pickerReady = true; resolve(); });
      });
    });
  }

  function ensureTokenClient() {
    if (!tokenClient) {
      tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPE, callback: function () {} });
    }
  }

  // Get an OAuth access token for the drive.file scope (prompts the teacher to sign in/consent).
  function getToken() {
    return new Promise(function (resolve, reject) {
      ensureTokenClient();
      tokenClient.callback = function (resp) {
        if (resp && resp.access_token) { accessToken = resp.access_token; resolve(accessToken); }
        else reject(new Error('Sign-in was cancelled'));
      };
      tokenClient.requestAccessToken({ prompt: accessToken ? '' : 'consent' });
    });
  }

  // Build + show a Picker; resolves with the selected docs (or null if cancelled).
  function buildPicker(token, opts) {
    return new Promise(function (resolve) {
      var b = new google.picker.PickerBuilder()
        .setOAuthToken(token)
        .setDeveloperKey(API_KEY)
        .setAppId(CLIENT_ID.split('-')[0]) // project number: grants drive.file access to picked files
        .setTitle(opts.title)
        .addView(opts.view)
        .setCallback(function (data) {
          var a = data[google.picker.Response.ACTION];
          if (a === google.picker.Action.PICKED) resolve(data[google.picker.Response.DOCUMENTS] || []);
          else if (a === google.picker.Action.CANCEL) resolve(null);
        });
      if (opts.multiselect) b.enableFeature(google.picker.Feature.MULTISELECT_ENABLED);
      b.build().setVisible(true);
    });
  }
  // Step 1: pick the responses spreadsheet (single).
  function pickSpreadsheet(token) {
    return buildPicker(token, {
      title: 'Step 1 of 2 — select your responses spreadsheet',
      view: new google.picker.DocsView(google.picker.ViewId.SPREADSHEETS)
    }).then(function (docs) { return docs && docs[0]; });
  }
  // Step 2: pick the photos folder (one click) or the photos (multi-select fallback).
  function pickPhotos(token) {
    return buildPicker(token, {
      title: 'Step 2 of 2 — select your photos folder (or the photos)',
      multiselect: true,
      view: new google.picker.DocsView(google.picker.ViewId.DOCS).setIncludeFolders(true).setSelectFolderEnabled(true)
    });
  }

  function authFetch(url, token) {
    return fetch(url, { headers: { Authorization: 'Bearer ' + token } });
  }
  function httpError(label, r) {
    return r.text().then(function (t) {
      throw new Error(label + ' (HTTP ' + r.status + '): ' + String(t).slice(0, 300));
    });
  }
  function downloadFile(id, token) {
    return authFetch('https://www.googleapis.com/drive/v3/files/' + encodeURIComponent(id) + '?alt=media', token)
      .then(function (r) { return r.ok ? r.blob() : httpError('Photo download failed', r); });
  }
  function exportSheetCsv(id, token) {
    return authFetch('https://www.googleapis.com/drive/v3/files/' + encodeURIComponent(id) + '/export?mimeType=text%2Fcsv', token)
      .then(function (r) { return r.ok ? r.text() : httpError('Could not read the spreadsheet', r); });
  }

  // Minimal RFC-4180-ish CSV parser (handles quoted fields, embedded commas/newlines).
  function parseCsv(text) {
    var rows = [], row = [], field = '', inQ = false, i = 0, c;
    for (; i < text.length; i++) {
      c = text[i];
      if (inQ) {
        if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
        else field += c;
      } else if (c === '"') { inQ = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c !== '\r') { field += c; }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  // From the responses CSV, produce [{ name, fileId }] using the name + photo columns.
  function pairsFromCsv(text) {
    var rows = parseCsv(text);
    if (rows.length < 2) return [];
    var header = rows[0].map(function (h) { return h.trim(); });
    var nameCol = header.indexOf(NAME_HEADER);
    var photoCol = header.indexOf(PHOTO_HEADER);
    if (nameCol < 0 || photoCol < 0) throw new Error('Could not find the "' + NAME_HEADER + '" / "' + PHOTO_HEADER + '" columns');
    var out = [];
    for (var i = 1; i < rows.length; i++) {
      var name = (rows[i][nameCol] || '').trim();
      var m = (rows[i][photoCol] || '').match(/[-\w]{25,}/); // the Drive file ID inside the link
      if (name && m) out.push({ name: name, fileId: m[0] });
    }
    return out;
  }

  // Sign in + pick the sheet & photos + read the responses, WITHOUT downloading the images.
  // Resolves with { token, folderPicked, students:[{ preferredName, fileId }] }. The web flow
  // downloads inline (see run); the native flow hands this back to the app (which downloads the
  // images itself), because the sign-in + Picker must run in a real browser, not the webview.
  function collect(onStatus) {
    onStatus = onStatus || function () {};
    if (!configured()) return Promise.reject(new Error('Google import is not configured'));
    return ensureLibs().then(getToken).then(function (token) {
      return pickSpreadsheet(token).then(function (sheet) {
        if (!sheet) return { token: token, folderPicked: false, students: [] }; // cancelled
        return pickPhotos(token).then(function (photoDocs) {
          if (!photoDocs) return { token: token, folderPicked: false, students: [] }; // cancelled
          var folderPicked = false, pickedIds = {};
          photoDocs.forEach(function (d) {
            if (d.mimeType === FOLDER_MIME) folderPicked = true;
            else if (/^image\//.test(d.mimeType || '')) pickedIds[d.id] = true;
          });
          onStatus('Reading responses…');
          return exportSheetCsv(sheet.id, token).then(function (csv) {
            var pairs = pairsFromCsv(csv);
            // If a folder was picked, try every response's photo (folder grant should allow it);
            // otherwise only the photos that were individually selected.
            var candidates = pairs.filter(function (p) { return folderPicked || pickedIds[p.fileId]; });
            if (!candidates.length) {
              throw new Error(folderPicked
                ? 'No photos matched — is that the "(File responses)" folder for this form?'
                : 'None of the selected photos matched the responses');
            }
            return {
              token: token,
              folderPicked: folderPicked,
              students: candidates.map(function (p) { return { preferredName: p.name, fileId: p.fileId }; })
            };
          });
        });
      });
    });
  }

  NameDeck.googleImport = {
    configured: configured,
    // Warm up the Google libraries ahead of time (e.g. when the roster opens), so the first
    // click can open the sign-in popup within the user's tap — otherwise the async load loses
    // the tap gesture and the browser blocks the popup (you'd have to click twice).
    preload: function () {
      if (configured()) ensureLibs().then(ensureTokenClient).catch(function () {});
    },
    // Sign in + pick + read (no download). Used by the native handoff page.
    collect: collect,
    // Download one photo by Drive file ID with a token from collect(). Used by the native app
    // to finish the import after the handoff.
    downloadPhoto: function (fileId, token) { return downloadFile(fileId, token); },
    // Web flow: collect, then download the photos inline. Resolves with [{ preferredName, blob }].
    // onStatus(message) is called at each phase (for the in-app progress line).
    run: function (onStatus) {
      onStatus = onStatus || function () {};
      return collect(onStatus).then(function (res) {
        var candidates = res.students || [];
        if (!candidates.length) return [];
        var total = candidates.length, done = 0;
        var tick = function () { done++; onStatus('Downloading photos… (' + done + ' of ' + total + ')'); };
        onStatus('Downloading photos… (0 of ' + total + ')');
        return Promise.all(candidates.map(function (p) {
          return downloadFile(p.fileId, res.token).then(
            function (blob) { tick(); return { preferredName: p.preferredName, blob: blob }; },
            function () { tick(); return null; } // tolerate individual failures
          );
        })).then(function (results) {
          var students = results.filter(Boolean);
          if (!students.length && res.folderPicked) {
            throw new Error("Couldn't open the photos in that folder — try selecting the photos individually instead.");
          }
          return students;
        });
      });
    }
  };
})();

  // Pick a student to quiz — weighted by each student's "appears" frequency (default 1),

  function pick() {

    var pool = list.filter(function (s) { return !current || s.id !== current.id; });
    var total = 0;
    pool.forEach(function (s) { total += (s.weight || 1); });
    var r = Math.random() * total;
    for (var i = 0; i < pool.length; i++) {

  function nameFromFilename(filename) {

      .replace(/\.[^.]+$/, '');                          // drop the extension
    base = base.replace(/_+/g, ' ')                      // underscores -> spaces
      .replace(/\s*\(\d+\)\s*$/, '')                     // drop a " (1)" duplicate suffix
      .replace(/\s+/g, ' ').trim();

    ND.googleImport.run(function (msg) { setImportStatus(msg, ''); }).then(function (students) {
      if (!students || !students.length) { setImportStatus('No students were imported.', ''); return; }
      students.forEach(function (s) {
        var stud = { id: 'r' + (++seq), preferredName: s.preferredName, photo: null, avatarSeed: s.preferredName };
        myRoster.push(stud);
        fileToPhoto(s.blob, function (dataUrl) { stud.photo = dataUrl; save(); renderList(); });
      });
      save();
      renderList();
      setImportStatus('Imported ' + students.length + ' student' + (students.length === 1 ? '' : 's') + ' ✓', 'ok');
    }).catch(function (err) {
      setImportStatus('Import failed: ' + (err && err.message ? err.message : err), 'error');
    });
  }

  // ---- Native "Import from Google" (Capacitor iOS) ----
  // Google refuses to run its sign-in inside an app's webview, so the native flow opens the
  // handoff page (native-import.html) in the real browser; that page signs in + picks + reads
  // the sheet, then returns via a namedeck:// link carrying the token + {name, fileId} list.
  // We finish here by downloading the photos with that token. See setupDeepLinks / finishNative.
  var NATIVE_IMPORT_URL = 'https://namedeck.netlify.app/native-import.html';

  function isNative() {
    return !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
  }

  function startNativeGoogleImport() {
    setImportStatus('Opening Google sign-in in your browser…', '');
    try {
      window.Capacitor.Plugins.Browser.open({ url: NATIVE_IMPORT_URL });
    } catch (e) {
      setImportStatus('Could not open the browser for Google sign-in.', 'error');
    }
  }

  // Register the namedeck:// deep-link listener that the handoff page returns to.
  function setupDeepLinks() {
    if (!isNative()) return;
    var App = window.Capacitor.Plugins.App;
    if (!App || !App.addListener) return;
    App.addListener('appUrlOpen', function (data) {
      var url = data && data.url;
      if (!url || url.indexOf('namedeck://import') !== 0) return;
      try { window.Capacitor.Plugins.Browser.close(); } catch (e) {} // dismiss the browser sheet
      finishNativeGoogleImport(url);
    });
  }

  function finishNativeGoogleImport(url) {
    if (document.querySelector('#rosterSheet').hidden) openRoster(); // show the status + new rows
    var frag = url.split('#')[1] || '';
    var payload = null;
    try { payload = JSON.parse(decodeURIComponent(frag)); } catch (e) { /* malformed */ }
    if (!payload || !payload.students || !payload.students.length) {
      setImportStatus('No students were imported.', '');
      return;
    }
    var token = payload.token, students = payload.students;
    var total = students.length, done = 0;
    var progress = function () {
      done++;
      if (done >= total) {
        save(); renderList();
        setImportStatus('Imported ' + total + ' student' + (total === 1 ? '' : 's') + ' ✓', 'ok');
      } else {
        setImportStatus('Downloading photos… (' + done + ' of ' + total + ')', '');
      }
    };
    students.forEach(function (s) {
      var stud = { id: 'r' + (++seq), preferredName: s.preferredName, photo: null, avatarSeed: s.preferredName };
      myRoster.push(stud);
      ND.googleImport.downloadPhoto(s.fileId, token).then(function (blob) {
        fileToPhoto(blob, function (dataUrl) { stud.photo = dataUrl; save(); renderList(); progress(); });
      }, function () { progress(); }); // tolerate individual failures (keeps the avatar fallback)
    });
    save();
    renderList();
    setImportStatus('Downloading photos… (0 of ' + total + ')', '');
  }

  function clearRoster() {
    askConfirm("Remove all students from your roster? This can't be undone.", 'Clear All', function () {
      myRoster = [];
      ND.rosterStore.clear();
      renderList();
    });
  }

  function renderList() {
    var el = document.querySelector('#rosterList');
    if (!myRoster.length) {
      el.innerHTML = '<div class="empty">No students yet — add names or import photos above.</div>';
      return;
    }
    el.innerHTML = myRoster.map(function (s) {
      var thumb = s.photo
        ? '<img src="' + escapeHtml(s.photo) + '" alt="" />'
        : ND.avatar(s.avatarSeed || s.preferredName, 44);
      return '<div class="rrow" data-id="' + escapeHtml(s.id) + '">' +
          '<div class="rthumb">' + thumb + '</div>' +
          '<input class="rname" value="' + escapeHtml(s.preferredName) + '" aria-label="Student name" readonly />' +
          '<button class="btn tiny edit">Edit</button>' +
          '<label class="btn tiny pick">' + (s.photo ? 'Change' : 'Photo') +
            '<input type="file" accept="image/*" class="rphoto" hidden /></label>' +
          '<button class="btn tiny remove" aria-label="Remove">&times;</button>' +
        '</div>';
    }).join('');
  }

  function rowStudent(target) {
    var row = target.closest && target.closest('.rrow');
    if (!row) return null;
    var id = row.getAttribute('data-id');
    for (var i = 0; i < myRoster.length; i++) {
      if (String(myRoster[i].id) === String(id)) return myRoster[i];
    }
    return null;
  }

  function onListInput(e) {
    if (!e.target.classList || !e.target.classList.contains('rname')) return;
    var s = rowStudent(e.target);
    if (!s) return;
    s.preferredName = e.target.value;         // don't re-render here: it would drop the cursor
    save();
  }
  function onListChange(e) {
    if (!e.target.classList || !e.target.classList.contains('rphoto')) return;
    var s = rowStudent(e.target);
    if (!s) return;
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    fileToPhoto(file, function (dataUrl) {
      s.photo = dataUrl;
      var saved = save();
      renderList();
      showStorageNotice(!saved); // photos are the big items — warn if the store is full
    });
  }
  function onListClick(e) {
    // Edit: unlock this row's name field so a mistyped name can be corrected.
    var edit = e.target.closest && e.target.closest('.edit');
    if (edit) {
      var input = edit.closest('.rrow').querySelector('.rname');
      input.removeAttribute('readonly');
      input.focus();
      input.select();
      return;
    }
    // Remove: drop this student from the roster.
    var rm = e.target.closest && e.target.closest('.remove');
    if (!rm) return;
    var row = rm.closest('.rrow');
    var id = row && row.getAttribute('data-id');
    myRoster = myRoster.filter(function (s) { return String(s.id) !== String(id); });
    save();
    renderList();
  }

  // Leaving the field (blur) finishes the edit and locks it again.
  function onListFocusOut(e) {
    if (!e.target.classList || !e.target.classList.contains('rname')) return;
    if (e.target.hasAttribute('readonly')) return;
    e.target.setAttribute('readonly', '');
    save();
  }
  // Enter finishes editing (blurs the field).
  function onListKeydown(e) {
    if (e.key === 'Enter' && e.target.classList && e.target.classList.contains('rname')) {
      e.preventDefault();
      e.target.blur();
    }
  }

  function save() { return ND.rosterStore.save(myRoster); }

  function showStorageNotice(show) {
    var n = document.querySelector('#storageNotice');
    if (n) n.hidden = !show;
  }

  // Read an image file, downscale it, and hand back a JPEG data URL. The cap (1000px)
  // is big enough to look sharp on a high-DPI card while staying small enough for
  // on-device storage. Never upscales past the original (scale is clamped to 1).
  function fileToPhoto(file, cb) {
    var reader = new FileReader();
    reader.onload = function () {
      var img = new Image();
      img.onload = function () {
        var max = 1000;
        var scale = Math.min(1, max / Math.max(img.width, img.height));
        var w = Math.max(1, Math.round(img.width * scale));
        var h = Math.max(1, Math.round(img.height * scale));
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        try {
          var ctx = canvas.getContext('2d');
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = 'high';
          ctx.drawImage(img, 0, 0, w, h);
          cb(canvas.toDataURL('image/jpeg', 0.9));
        } catch (e) {
          cb(reader.result); // canvas unavailable — store the original
        }
      };
      img.onerror = function () { cb(reader.result); };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  // ---- Flashcard ----
  // Rebuild the deck from scratch (used when the roster changes): fresh history, but keep
  // the current play/pause state (so closing the roster doesn't force it back to playing).
  function refreshDeck() {
    clearTimers();
    history = [];
    pos = -1;
    if (myRoster.length) { updateControls(); nextCard(); }
    else showEmpty();
  }

  // Resume the current card in place (after the settings sheet closes) without resetting.
  function resumeDeck() {
    clearTimers();
    showTransport(true);
    updateControls();
    renderNameSlot();
    if (!paused) armForState();
  }

  function showEmpty() {
    current = null;
    revealed = false;
    showTransport(false);
    document.querySelector('#freq').hidden = true;
    document.querySelector('#avatar').innerHTML =
      '<div class="empty-deck">' +
        '<div class="empty-title">No students yet</div>' +
        '<div class="empty-sub">Add your class to start studying their names.</div>' +
        '<button class="btn primary" id="emptyAdd">Add roster</button>' +
      '</div>';
    document.querySelector('#nameSlot').innerHTML = '';
    document.querySelector('#emptyAdd').addEventListener('click', function (ev) {
      ev.stopPropagation(); // don't also trigger the card tap
      openRoster();
    });
  }

  function showCard(p) {
    current = p;
    revealed = false;
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
    showTransport(true);
    var av = document.querySelector('#avatar');
    av.innerHTML = '';
    var fallback = function () {
      if (current === p) av.innerHTML = ND.avatar(p.avatarSeed || p.preferredName, 320);
    };
    if (p.photo) {
      var img = document.createElement('img');
      img.className = 'photo'; img.alt = 'portrait';
      img.onerror = fallback;
      img.src = p.photo;
      av.appendChild(img);
    } else if (p.wiki) {
      var wimg = document.createElement('img');
      wimg.className = 'photo'; wimg.alt = 'portrait';
      wimg.onerror = fallback;
      av.appendChild(wimg);
      loadWikiPhoto(p, wimg, fallback); // demo roster: fetch the portrait from Wikipedia
    } else {
      fallback(); // named student, no photo yet
    }
    renderNameSlot();
    updateControls();
    if (!paused) armReveal();
  }

  // Fetch a public-domain portrait from Wikipedia's REST API (used by the first-run demo
  // roster). Falls back to a generated avatar on any failure (offline, blocked, or no image).
  function loadWikiPhoto(p, imgEl, fallback) {
    if (typeof fetch !== 'function' || !p.wiki) { fallback(); return; }
    fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(p.wiki))
      .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function (data) {
        if (current !== p) return; // a newer card is showing; ignore this stale result
        var src = data && data.thumbnail && data.thumbnail.source;
        if (src) { imgEl.src = src; } else { fallback(); }
      })
      .catch(function () { if (current === p) fallback(); });
  }

  // Render the name slot for the current state (hidden vs revealed, playing vs paused).
  function renderNameSlot() {
    var slot = document.querySelector('#nameSlot');
    if (!current) { slot.innerHTML = ''; return; }
    if (revealed) {
      slot.innerHTML = '<div class="name">' + escapeHtml(current.preferredName) + '</div>' +
        (paused ? '' : '<div class="waiting">tap or wait…</div>');
    } else {
      slot.innerHTML = '<div class="waiting">' + (paused ? 'tap to reveal' : 'tap or wait…') + '</div>';
    }
  }

  function armReveal() {
    if (revealTimer) clearTimeout(revealTimer);
    revealTimer = setTimeout(reveal, delay * 1000);
  }

  function armAdvance() {
    if (advanceTimer) clearTimeout(advanceTimer);
    advanceTimer = setTimeout(nextCard, gap * 1000);
  }

  function armForState() {   // resume the cycle from wherever the current card is
    if (paused || !current) return;
    if (revealed) armAdvance(); else armReveal();
  }

  function clearTimers() {
    if (revealTimer) { clearTimeout(revealTimer); revealTimer = null; }
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
  }

  function reveal() {
    if (!current || revealed) return;
    revealed = true;
    if (revealTimer) { clearTimeout(revealTimer); revealTimer = null; }
    renderNameSlot();
    if (!paused) armAdvance();
  }

  // ---- Playback controls ----
  function togglePause() { setPaused(!paused); }
  function setPaused(p) {
    paused = p;
    if (paused) clearTimers();
    updateControls();
    renderNameSlot();
    if (!paused) armForState();
  }
  function showTransport(show) { document.querySelector('#transport').hidden = !show; }
  function updateControls() {
    var pp = document.querySelector('#playPause');
    pp.innerHTML = paused ? PLAY_SVG : PAUSE_SVG;
    pp.setAttribute('aria-label', paused ? 'Continue' : 'Pause');
    // Prev/Next step through cards, and are only usable while paused.
    document.querySelector('#prevCard').disabled = !paused || pos <= 0;
    document.querySelector('#nextCard').disabled = !paused;
    // The frequency selector is only shown while paused (there's no time to use it mid-cycle).
    document.querySelector('#freq').hidden = !(paused && current);
    renderFreq();
  }

  // Highlight the current student's "appears" level in the frequency selector.
  function renderFreq() {
    var seg = document.querySelector('#freqSeg');
    var w = current ? (current.weight || 1) : 1;
    var opts = seg.querySelectorAll('.freq-opt');
    for (var i = 0; i < opts.length; i++) {
      var active = parseFloat(opts[i].getAttribute('data-w')) === w;
      opts[i].classList.toggle('active', active);
      opts[i].setAttribute('aria-pressed', active ? 'true' : 'false');
    }
  }

  // Set how often the current student appears (a weight for the weighted pick).
  function onFreqClick(e) {
    var btn = e.target.closest && e.target.closest('.freq-opt');
    if (!btn || !current) return;
    current.weight = parseFloat(btn.getAttribute('data-w'));
    save();
    renderFreq();
  }

  // Tap the card: reveal the name; when playing, a second tap skips ahead.
  function onCardTap() {
    if (paused) { if (!revealed) reveal(); return; }
    if (revealed) nextCard(); else reveal();
  }

  // Advance: step forward through history, or draw a new student at the end.
  function nextCard() {
    if (pos < history.length - 1) { pos++; }
    else { history.push(pick()); pos = history.length - 1; }
    showCard(history[pos]);
  }
  // Step back to a previously-shown card (only meaningful while paused).
  function prevCard() {
    if (pos > 0) { pos--; showCard(history[pos]); }
  }

  render();
  setupDeepLinks(); // listen for the namedeck:// handoff (native only; no-op on the web)
})();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</body>
