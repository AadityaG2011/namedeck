<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>NameDeck — prototype</title>
<style>
:root {
  --card: #ffffff; --ink: #1a2233; --muted: #7a869a; --accent: #5B8DEF; --line: #e7ebf2;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: radial-gradient(120% 80% at 50% -10%, #1b2740 0%, #0f1420 60%);
  min-height: 100vh; display: flex; justify-content: center; padding: 24px 12px; color: var(--ink);
}
.phone {
  width: 100%; max-width: 390px; background: #f4f6fb; border-radius: 34px;
  box-shadow: 0 24px 60px rgba(0,0,0,.45), inset 0 0 0 8px #000; overflow: hidden; min-height: 720px;
}
#app { padding: 12px; }
.screen { position: relative; display: flex; flex-direction: column; min-height: 696px; }

/* Gear button — floats over the top-right corner of the card. */
.gear {
  position: absolute; top: 8px; right: 8px; z-index: 3;
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  border: none; border-radius: 12px; background: rgba(255,255,255,.78); color: var(--ink);
  cursor: pointer; box-shadow: 0 2px 8px rgba(20,30,60,.14);
}
.gear:active { transform: scale(.94); }

/* Settings panel — hidden until the gear is tapped. */
.settings {
  position: absolute; top: 54px; right: 0; left: 0; z-index: 4;
  background: var(--card); border-radius: 16px; padding: 14px 16px 16px;
  box-shadow: 0 12px 32px rgba(20,30,60,.22);
}
.settings[hidden] { display: none; }
.settings-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.settings-head span { font-weight: 700; font-size: 15px; }
.close { border: none; background: none; font-size: 22px; line-height: 1; color: var(--muted);
  cursor: pointer; padding: 0 6px; }
.control { margin-top: 12px; }
.control label { display: block; font-size: 14px; color: var(--muted); margin-bottom: 6px; }
.control label b { color: var(--ink); }
.control input[type=range] { width: 100%; accent-color: var(--accent); }

/* Card fills the screen; the image is the star. */
.card {
  flex: 1; display: flex; flex-direction: column;
  background: var(--card); border-radius: 22px; padding: 10px; text-align: center;
  box-shadow: 0 8px 26px rgba(20,30,60,.10); cursor: pointer;
}
.avatar { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
.avatar .photo, .avatar svg {
  width: 100%; height: 100%; border-radius: 16px; box-shadow: 0 4px 14px rgba(0,0,0,.12);
}
.avatar .photo { object-fit: cover; background: #e7ebf2; }
.name-slot { flex: 0 0 auto; min-height: 54px; display: flex; flex-direction: column;
  justify-content: center; padding: 8px 0 4px; }
.waiting { color: #c3ccdb; font-size: 15px; letter-spacing: .3px; }
.name { font-size: 30px; font-weight: 800; animation: pop .22s ease; }
@keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
  <div class="phone"><div id="app"></div></div>
  <script>
/* ===== src/data/roster.js ===== */
// roster.js — real squad sample data: USA Men's National Team, FIFA World Cup 2026.
//
// Senior national-team players — public adult figures (no minors). Their names are
// public facts. Photos are NOT bundled: at runtime the app fetches each player's
// portrait from Wikipedia's REST API (see app.js). Wikipedia disallows unlicensed
// photos of living people, so those portraits are freely licensed. If a portrait can't
// load, the app falls back to a generated avatar (avatar.js).
//
// In the real product this array becomes a school-authorized student roster, stored
// locally on the teacher's device.
//
//   preferredName the name you're quizzed on
//   wiki          Wikipedia article title, used to fetch the portrait at runtime
//   position/number shown after the name is revealed
//   avatarSeed    offline fallback avatar

window.NameDeck = window.NameDeck || {};

NameDeck.roster = [
  { id: 'u01', preferredName: 'Matt Turner',        wiki: 'Matt_Turner_(soccer)',   position: 'Goalkeeper', number: 1,  avatarSeed: 'turner' },
  { id: 'u02', preferredName: 'Matt Freese',        wiki: 'Matt_Freese',            position: 'Goalkeeper', number: 24, avatarSeed: 'freese' },
  { id: 'u03', preferredName: 'Chris Brady',        wiki: 'Chris_Brady_(soccer)',   position: 'Goalkeeper', number: 25, avatarSeed: 'brady' },
  { id: 'u04', preferredName: 'Sergiño Dest',       wiki: 'Sergiño_Dest',           position: 'Defender',   number: 2,  avatarSeed: 'dest' },
  { id: 'u05', preferredName: 'Chris Richards',     wiki: 'Chris_Richards_(soccer)',position: 'Defender',   number: 3,  avatarSeed: 'richards' },
  { id: 'u06', preferredName: 'Antonee Robinson',   wiki: 'Antonee_Robinson',       position: 'Defender',   number: 5,  avatarSeed: 'arobinson' },
  { id: 'u07', preferredName: 'Auston Trusty',      wiki: 'Auston_Trusty',          position: 'Defender',   number: 6,  avatarSeed: 'trusty' },
  { id: 'u08', preferredName: 'Miles Robinson',     wiki: 'Miles_Robinson_(soccer)',position: 'Defender',   number: 12, avatarSeed: 'mrobinson' },
  { id: 'u09', preferredName: 'Tim Ream',           wiki: 'Tim_Ream',               position: 'Defender',   number: 13, avatarSeed: 'ream' },
  { id: 'u10', preferredName: 'Alex Freeman',       wiki: 'Alex_Freeman'                ,  position: 'Defender',   number: 16, avatarSeed: 'freeman' },
  { id: 'u11', preferredName: 'Max Arfsten',        wiki: 'Max_Arfsten',            position: 'Defender',   number: 18, avatarSeed: 'arfsten' },
  { id: 'u12', preferredName: 'Mark McKenzie',      wiki: 'Mark_McKenzie_(soccer,_born_1999)', position: 'Defender',   number: 22, avatarSeed: 'mckenzie' },
  { id: 'u13', preferredName: 'Joe Scally',         wiki: 'Joe_Scally',             position: 'Defender',   number: 23, avatarSeed: 'scally' },
  { id: 'u14', preferredName: 'Tyler Adams',        wiki: 'Tyler_Adams'                ,   position: 'Midfielder', number: 4,  avatarSeed: 'adams' },
  { id: 'u15', preferredName: 'Gio Reyna',          wiki: 'Giovanni_Reyna',         position: 'Midfielder', number: 7,  avatarSeed: 'reyna' },
  { id: 'u16', preferredName: 'Weston McKennie',    wiki: 'Weston_McKennie',        position: 'Midfielder', number: 8,  avatarSeed: 'mckennie' },
  { id: 'u17', preferredName: 'Sebastian Berhalter',wiki: 'Sebastian_Berhalter',    position: 'Midfielder', number: 14, avatarSeed: 'berhalter' },
  { id: 'u18', preferredName: 'Cristian Roldan',    wiki: 'Cristian_Roldan',        position: 'Midfielder', number: 15, avatarSeed: 'roldan' },
  { id: 'u19', preferredName: 'Malik Tillman',      wiki: 'Malik_Tillman',          position: 'Midfielder', number: 17, avatarSeed: 'tillman' },
  { id: 'u20', preferredName: 'Christian Pulisic',  wiki: 'Christian_Pulisic',      position: 'Forward',    number: 10, avatarSeed: 'pulisic' },
  { id: 'u21', preferredName: 'Brenden Aaronson',   wiki: 'Brenden_Aaronson',       position: 'Forward',    number: 11, avatarSeed: 'aaronson' },
  { id: 'u22', preferredName: 'Folarin Balogun',    wiki: 'Folarin_Balogun',        position: 'Forward',    number: 20, avatarSeed: 'balogun' },
  { id: 'u23', preferredName: 'Ricardo Pepi',       wiki: 'Ricardo_Pepi',           position: 'Forward',    number: 9,  avatarSeed: 'pepi' },
  { id: 'u24', preferredName: 'Tim Weah',           wiki: 'Tim_Weah',               position: 'Forward',    number: 21, avatarSeed: 'weah' },
  { id: 'u25', preferredName: 'Haji Wright',        wiki: 'Haji_Wright',            position: 'Forward',    number: 19, avatarSeed: 'wright' },
  { id: 'u26', preferredName: 'Alejandro Zendejas', wiki: 'Alejandro_Zendejas',     position: 'Forward',    number: 26, avatarSeed: 'zendejas' },
];


/* ===== src/core/avatar.js ===== */
// avatar.js — deterministic procedural avatars.
//
// Generates a distinct, repeatable SVG face from a seed string. Same seed -> same face.
// This stands in for a real photo in the prototype so we never handle a real person's
// image. In the native app, this is replaced by the (locally stored) student photo.

window.NameDeck = window.NameDeck || {};

(function () {
  // Simple deterministic string hash -> 32-bit int.
  function hash(str) {
    let h = 2166136261;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  // Seeded pseudo-random generator (mulberry32).
  function rng(seedInt) {
    let a = seedInt;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const BG        = ['#5B8DEF', '#EF7A5B', '#3FB68B', '#B65BEF', '#EFC15B', '#5BC7EF', '#EF5B9C', '#7A8B99'];
  const SKIN      = ['#F2D3B3', '#E5B98E', '#C68642', '#8D5524', '#5C3A21', '#FFE0BD'];
  const HAIR      = ['#2B2B2B', '#4A2E19', '#7A4B1E', '#B8860B', '#8B0000', '#D9D9D9', '#1A1A1A'];
  const pick = (arr, r) => arr[Math.floor(r() * arr.length)];

  // Returns an SVG string for the given seed.
  NameDeck.avatar = function (seed, size) {
    size = size || 160;
    const r = rng(hash(seed));
    const bg = pick(BG, r);
    const skin = pick(SKIN, r);
    const hair = pick(HAIR, r);
    const hairStyle = Math.floor(r() * 4); // 0 short, 1 flat-top, 2 curly, 3 bald-ish
    const hasBeard = r() > 0.6;
    const eyeType = Math.floor(r() * 3);
    const browRaise = r() > 0.5 ? -2 : 0;

    // Face geometry (viewBox 100x100)
    const cx = 50, cy = 54, fr = 26; // face center + radius

    let hairSvg = '';
    if (hairStyle === 0) {
      hairSvg = `<path d="M24 46 Q50 8 76 46 Q76 30 50 24 Q24 30 24 46 Z" fill="${hair}"/>`;
    } else if (hairStyle === 1) {
      hairSvg = `<rect x="24" y="22" width="52" height="20" rx="6" fill="${hair}"/>`;
    } else if (hairStyle === 2) {
      hairSvg = `<g fill="${hair}">
        <circle cx="30" cy="34" r="9"/><circle cx="42" cy="26" r="10"/>
        <circle cx="58" cy="26" r="10"/><circle cx="70" cy="34" r="9"/>
        <circle cx="50" cy="24" r="10"/></g>`;
    } else {
      hairSvg = `<path d="M26 42 Q50 30 74 42 Q70 34 50 32 Q30 34 26 42 Z" fill="${hair}" opacity="0.9"/>`;
    }

    const beardSvg = hasBeard
      ? `<path d="M${cx-fr+4} ${cy+6} Q${cx} ${cy+fr+12} ${cx+fr-4} ${cy+6} Q${cx} ${cy+fr} ${cx-fr+4} ${cy+6} Z" fill="${hair}" opacity="0.85"/>`
      : '';

    let eyesSvg;
    if (eyeType === 0) {
      eyesSvg = `<circle cx="41" cy="52" r="3" fill="#222"/><circle cx="59" cy="52" r="3" fill="#222"/>`;
    } else if (eyeType === 1) {
      eyesSvg = `<rect x="38" y="50" width="7" height="4" rx="2" fill="#222"/><rect x="55" y="50" width="7" height="4" rx="2" fill="#222"/>`;
    } else {
      eyesSvg = `<path d="M38 52 Q41 49 44 52" stroke="#222" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                 <path d="M56 52 Q59 49 62 52" stroke="#222" stroke-width="2.4" fill="none" stroke-linecap="round"/>`;
    }

    const browsSvg = `<path d="M37 ${46+browRaise} q4 -2 8 0" stroke="${hair}" stroke-width="2" fill="none" stroke-linecap="round"/>
                      <path d="M55 ${46+browRaise} q4 -2 8 0" stroke="${hair}" stroke-width="2" fill="none" stroke-linecap="round"/>`;

    const smile = r() > 0.5;
    const mouthSvg = smile
      ? `<path d="M43 64 Q50 71 57 64" stroke="#7a3b2e" stroke-width="2.4" fill="none" stroke-linecap="round"/>`
      : `<path d="M44 66 L56 66" stroke="#7a3b2e" stroke-width="2.4" fill="none" stroke-linecap="round"/>`;

    return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="avatar">
      <defs><clipPath id="cl-${hash(seed)}"><rect width="100" height="100" rx="16"/></clipPath></defs>
      <g clip-path="url(#cl-${hash(seed)})">
        <rect width="100" height="100" fill="${bg}"/>
        <circle cx="${cx}" cy="88" r="34" fill="#ffffff" opacity="0.18"/>
        <circle cx="${cx}" cy="${cy}" r="${fr}" fill="${skin}"/>
        ${beardSvg}
        <ellipse cx="${cx-fr+2}" cy="${cy+2}" rx="4" ry="6" fill="${skin}"/>
        <ellipse cx="${cx+fr-2}" cy="${cy+2}" rx="4" ry="6" fill="${skin}"/>
        ${hairSvg}
        ${browsSvg}
        ${eyesSvg}
        ${mouthSvg}
      </g>
    </svg>`;
  };
})();


/* ===== src/ui/app.js ===== */
// app.js — MVP: one mode. Show a photo, reveal the name after a delay, then
// auto-advance to the next student after a second delay. Both delays are adjustable
// from a gear/settings panel. Tap the card to reveal the name early; tap again to
// skip to the next student. State is in-memory (a prototype choice).
// WEB-ONLY; rewritten in SwiftUI later.

(function () {
  const ND = window.NameDeck;
  const roster = ND.roster;
  const app = document.querySelector('#app');

  let delay = 3;        // seconds before the name appears
  let gap = 4;          // seconds the name stays up before advancing to the next student
  let current = null;   // current student
  let revealTimer = null;
  let advanceTimer = null;
  let revealed = false;

  // Feather "settings" gear icon (inline so the app stays zero-dependency).
  const GEAR_SVG =
    '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" ' +
    'stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
    '<circle cx="12" cy="12" r="3"/>' +
    '<path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 ' +
    '1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 ' +
    '1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 ' +
    '4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 ' +
    '0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 ' +
    '1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>';

  function pick() {
    let p;
    do { p = roster[Math.floor(Math.random() * roster.length)]; }
    while (roster.length > 1 && current && p.id === current.id);
    return p;
  }

  function render() {
    app.innerHTML =
      '<div class="screen">' +
        '<button class="gear" id="gear" aria-label="Settings" title="Settings">' + GEAR_SVG + '</button>' +
        '<div class="settings" id="settings" hidden>' +
          '<div class="settings-head">' +
            '<span>Settings</span>' +
            '<button class="close" id="closeSettings" aria-label="Close settings">&times;</button>' +
          '</div>' +
          '<div class="control">' +
            '<label>Reveal name after <b id="delayVal">' + delay + 's</b></label>' +
            '<input id="delay" type="range" min="1" max="10" step="1" value="' + delay + '" />' +
          '</div>' +
          '<div class="control">' +
            '<label>Next student after <b id="gapVal">' + gap + 's</b></label>' +
            '<input id="gap" type="range" min="1" max="15" step="1" value="' + gap + '" />' +
          '</div>' +
        '</div>' +
        '<div class="card" id="card">' +
          '<div class="avatar" id="avatar"></div>' +
          '<div class="name-slot" id="nameSlot"></div>' +
        '</div>' +
      '</div>';

    document.querySelector('#delay').addEventListener('input', function (e) {
      delay = parseInt(e.target.value, 10);
      document.querySelector('#delayVal').textContent = delay + 's';
      if (!revealed) armReveal(); // apply the new delay to the current card
    });
    document.querySelector('#gap').addEventListener('input', function (e) {
      gap = parseInt(e.target.value, 10);
      document.querySelector('#gapVal').textContent = gap + 's';
      if (revealed) armAdvance(); // apply the new gap to a card already showing its name
    });
    document.querySelector('#gear').addEventListener('click', toggleSettings);
    document.querySelector('#closeSettings').addEventListener('click', closeSettings);
    document.querySelector('#card').addEventListener('click', onCardTap);

    nextCard();
  }

  function toggleSettings() {
    const s = document.querySelector('#settings');
    s.hidden = !s.hidden;
  }
  function closeSettings() { document.querySelector('#settings').hidden = true; }

  function loadPhoto(p, imgEl, fallback) {
    // Fetch the person's public-domain portrait from Wikipedia's REST API at runtime.
    // Fall back to a generated avatar on any failure (no network, blocked, no image).
    if (typeof fetch !== 'function' || !p.wiki) { fallback(); return; }
    fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(p.wiki))
      .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function (data) {
        if (current !== p) return; // a newer card is showing; ignore stale result
        var src = data && data.thumbnail && data.thumbnail.source;
        if (src) { imgEl.src = src; } else { fallback(); }
      })
      .catch(function () { if (current === p) fallback(); });
  }

  function showCard(p) {
    current = p;
    revealed = false;
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
    const av = document.querySelector('#avatar');
    av.innerHTML = '';
    const img = document.createElement('img');
    img.className = 'photo';
    img.alt = 'portrait';
    const fallback = function () { if (current === p) av.innerHTML = ND.avatar(p.avatarSeed, 320); };
    img.onerror = fallback;
    av.appendChild(img);
    loadPhoto(p, img, fallback);
    document.querySelector('#nameSlot').innerHTML = '<div class="waiting">tap or wait…</div>';
    armReveal();
  }

  function armReveal() {
    if (revealTimer) clearTimeout(revealTimer);
    revealTimer = setTimeout(reveal, delay * 1000);
  }

  function armAdvance() {
    if (advanceTimer) clearTimeout(advanceTimer);
    advanceTimer = setTimeout(nextCard, gap * 1000);
  }

  function reveal() {
    if (!current || revealed) return;
    revealed = true;
    if (revealTimer) { clearTimeout(revealTimer); revealTimer = null; }
    const p = current;
    document.querySelector('#nameSlot').innerHTML = '<div class="name">' + p.preferredName + '</div>';
    armAdvance(); // once the name is up, wait `gap` then move to the next student automatically
  }

  // Tap the card: first tap reveals the name, a second tap skips to the next student.
  function onCardTap() { if (revealed) nextCard(); else reveal(); }
  function nextCard() { showCard(pick()); }

  render();
})();

  </script>
</body>
</html>
