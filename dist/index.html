<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>NameDeck — prototype</title>
<style>
:root {
  --bg: #0f1420;
  --card: #ffffff;
  --ink: #1a2233;
  --muted: #7a869a;
  --accent: #5B8DEF;
  --good: #3FB68B;
  --bad: #EF5B6B;
  --line: #e7ebf2;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: radial-gradient(120% 80% at 50% -10%, #1b2740 0%, #0f1420 60%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 24px 12px;
  color: var(--ink);
}
.phone {
  width: 100%;
  max-width: 390px;
  background: #f4f6fb;
  border-radius: 34px;
  box-shadow: 0 24px 60px rgba(0,0,0,.45), inset 0 0 0 8px #000;
  overflow: hidden;
  min-height: 780px;
  position: relative;
}
#app { padding: 26px 20px 30px; }
.screen { animation: fade .18s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.brand { font-size: 30px; font-weight: 800; letter-spacing: -.5px; }
.subtitle { color: var(--muted); margin: 2px 0 18px; font-size: 15px; }

/* progress */
.progress { background: var(--card); border-radius: 18px; padding: 16px; box-shadow: 0 2px 10px rgba(20,30,60,.06); }
.progress-head { display: flex; justify-content: space-between; font-size: 14px; }
.bar { height: 10px; background: #eef1f7; border-radius: 6px; margin: 10px 0 12px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #7fb0ff); border-radius: 6px; transition: width .4s ease; }
.legend { display: flex; gap: 14px; font-size: 12px; color: var(--muted); }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
.dot.fresh { background: #c3ccdb; } .dot.learning { background: var(--accent); } .dot.mastered { background: var(--good); }
.muted { color: var(--muted); }

/* modes */
.modes { display: grid; gap: 12px; margin: 20px 0 14px; }
.mode { display: grid; grid-template-columns: 40px 1fr; grid-template-rows: auto auto; column-gap: 12px;
  align-items: center; text-align: left; background: var(--card); border: none; border-radius: 16px;
  padding: 16px; cursor: pointer; box-shadow: 0 2px 10px rgba(20,30,60,.05); transition: transform .1s; }
.mode:active { transform: scale(.98); }
.mode-emoji { grid-row: 1 / 3; font-size: 26px; }
.mode-title { font-weight: 700; font-size: 16px; }
.mode-sub { color: var(--muted); font-size: 13px; }
.reset { width: 100%; background: none; border: 1px solid var(--line); color: var(--muted);
  padding: 11px; border-radius: 12px; cursor: pointer; font-size: 14px; }
.footer { text-align: center; color: var(--muted); font-size: 11.5px; margin-top: 18px; line-height: 1.5; }

/* topbar */
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.back { background: none; border: none; color: var(--accent); font-size: 16px; cursor: pointer; padding: 4px 0; }
.topbar-title { font-weight: 700; }
.topbar-count { color: var(--muted); font-size: 14px; min-width: 40px; text-align: right; }

/* card */
.card { background: var(--card); border-radius: 22px; padding: 24px 20px 26px; text-align: center;
  box-shadow: 0 8px 26px rgba(20,30,60,.10); }
.avatar { display: flex; justify-content: center; margin-bottom: 18px; }
.avatar svg { border-radius: 20px; box-shadow: 0 4px 14px rgba(0,0,0,.12); }
.reveal { width: 100%; padding: 14px; border: 1px dashed var(--line); background: #fafbfe;
  color: var(--muted); border-radius: 14px; cursor: pointer; font-size: 15px; }
.answer .name { font-size: 26px; font-weight: 800; }
.answer .phonetic, .phonetic { color: var(--accent); font-size: 15px; margin-top: 2px; }
.answer .meta { color: var(--muted); font-size: 13px; margin-top: 6px; }
.hidden { display: none; }

.rate { display: flex; gap: 10px; margin-top: 18px; }
.btn { flex: 1; padding: 13px; border: none; border-radius: 13px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn.good { background: var(--good); color: #fff; }
.btn.bad { background: #fdecee; color: var(--bad); }
.btn.submit { background: var(--accent); color: #fff; margin-top: 12px; width: 100%; }
.btn.next { background: var(--ink); color: #fff; margin-top: 14px; width: 100%; }

/* options */
.options { display: grid; gap: 10px; margin-top: 20px; }
.opt { padding: 15px; border: 1px solid var(--line); background: #fff; border-radius: 14px;
  font-size: 16px; font-weight: 600; cursor: pointer; transition: .12s; }
.opt:active { transform: scale(.98); }
.opt.correct { background: #e7f7f0; border-color: var(--good); color: #1f8a63; }
.opt.wrong { background: #fdecee; border-color: var(--bad); color: var(--bad); }

/* type */
.typeform { margin-top: 20px; }
.nameinput { width: 100%; padding: 15px; border: 1px solid var(--line); border-radius: 14px;
  font-size: 17px; text-align: center; }
.nameinput:focus { outline: none; border-color: var(--accent); }
.feedback { margin-top: 14px; font-size: 17px; min-height: 24px; }
.feedback .ok { color: var(--good); font-weight: 600; }
.feedback .no { color: var(--bad); font-weight: 600; }

/* grid */
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.grid-card { background: var(--card); border-radius: 14px; padding: 10px 6px; text-align: center;
  box-shadow: 0 2px 8px rgba(20,30,60,.05); }
.grid-card svg { border-radius: 12px; width: 100%; height: auto; }
.grid-name { font-weight: 700; font-size: 13px; margin-top: 6px; }
.grid-meta { color: var(--muted); font-size: 11px; }

</style>
</head>
<body>
  <div class="phone"><div id="app"></div></div>
  <script>
/* ===== src/data/roster.js ===== */
// roster.js — synthetic sample data for the prototype.
//
// These are INVENTED names for a fictional Under-23 squad, chosen to be diverse and
// to include pronunciation hints (the feature that helps teachers say names correctly).
// No real person is represented. In the real app this array is replaced by a
// school-authorized roster stored locally on the teacher's device.
//
// Shape of each player:
//   id           unique id
//   preferredName the name the app tests you on
//   legalName     optional full/legal name
//   phonetic      optional pronunciation hint (shown in study mode)
//   position      GK | DF | MF | FW
//   number        jersey number
//   avatarSeed    seed string for the procedural avatar generator

window.NameDeck = window.NameDeck || {};

NameDeck.roster = [
  { id: 'p01', preferredName: 'Mateo',    legalName: 'Mateo Alvarez',        phonetic: 'mah-TAY-oh',     position: 'FW', number: 9,  avatarSeed: 'mateo-alvarez' },
  { id: 'p02', preferredName: 'Kenji',    legalName: 'Kenji Nakamura',       phonetic: 'KEN-jee',        position: 'MF', number: 8,  avatarSeed: 'kenji-nakamura' },
  { id: 'p03', preferredName: 'Amara',    legalName: 'Amara Okafor',         phonetic: 'ah-MAH-rah',     position: 'DF', number: 4,  avatarSeed: 'amara-okafor' },
  { id: 'p04', preferredName: 'Léo',      legalName: 'Léo Dubois',           phonetic: 'LAY-oh',         position: 'MF', number: 10, avatarSeed: 'leo-dubois' },
  { id: 'p05', preferredName: 'Saoirse',  legalName: 'Saoirse Byrne',        phonetic: 'SUR-shuh',       position: 'FW', number: 11, avatarSeed: 'saoirse-byrne' },
  { id: 'p06', preferredName: 'Dmitri',   legalName: 'Dmitri Volkov',        phonetic: 'DMEE-tree',      position: 'GK', number: 1,  avatarSeed: 'dmitri-volkov' },
  { id: 'p07', preferredName: 'Chidi',    legalName: 'Chidi Eze',           phonetic: 'CHEE-dee',       position: 'DF', number: 3,  avatarSeed: 'chidi-eze' },
  { id: 'p08', preferredName: 'Ravi',     legalName: 'Ravi Chandran',        phonetic: 'RAH-vee',        position: 'MF', number: 6,  avatarSeed: 'ravi-chandran' },
  { id: 'p09', preferredName: 'Nikoloz',  legalName: 'Nikoloz Beridze',      phonetic: 'nee-koh-LOZ',    position: 'DF', number: 5,  avatarSeed: 'nikoloz-beridze' },
  { id: 'p10', preferredName: 'Thabo',    legalName: 'Thabo Molefe',         phonetic: 'TAH-boh',        position: 'FW', number: 7,  avatarSeed: 'thabo-molefe' },
  { id: 'p11', preferredName: 'Youssef',  legalName: 'Youssef El-Amin',      phonetic: 'YOO-sef',        position: 'MF', number: 14, avatarSeed: 'youssef-elamin' },
  { id: 'p12', preferredName: 'Bjørn',    legalName: 'Bjørn Halvorsen',      phonetic: 'BYURN',          position: 'DF', number: 2,  avatarSeed: 'bjorn-halvorsen' },
  { id: 'p13', preferredName: 'Iker',     legalName: 'Iker Etxeberria',      phonetic: 'EE-kair',        position: 'GK', number: 12, avatarSeed: 'iker-etxeberria' },
  { id: 'p14', preferredName: 'Tariq',    legalName: 'Tariq Hassan',         phonetic: 'TAH-rik',        position: 'FW', number: 17, avatarSeed: 'tariq-hassan' },
  { id: 'p15', preferredName: 'Joon-ho',  legalName: 'Kim Joon-ho',          phonetic: 'JOON-hoh',       position: 'MF', number: 16, avatarSeed: 'joonho-kim' },
  { id: 'p16', preferredName: 'Andrés',   legalName: 'Andrés Restrepo',      phonetic: 'ahn-DRESS',      position: 'DF', number: 15, avatarSeed: 'andres-restrepo' },
  { id: 'p17', preferredName: 'Emeka',    legalName: 'Emeka Nwosu',          phonetic: 'eh-MEH-kah',     position: 'MF', number: 18, avatarSeed: 'emeka-nwosu' },
  { id: 'p18', preferredName: 'Lucas',    legalName: 'Lucas Ferreira',       phonetic: 'LOO-kas',        position: 'FW', number: 19, avatarSeed: 'lucas-ferreira' },
  { id: 'p19', preferredName: 'Sana',     legalName: 'Sana Qureshi',         phonetic: 'SAH-nah',        position: 'DF', number: 20, avatarSeed: 'sana-qureshi' },
  { id: 'p20', preferredName: 'Milan',    legalName: 'Milan Novak',          phonetic: 'MEE-lahn',       position: 'GK', number: 13, avatarSeed: 'milan-novak' },
];


/* ===== src/core/avatar.js ===== */
// avatar.js — deterministic procedural avatars.
//
// Generates a distinct, repeatable SVG face from a seed string. Same seed -> same face.
// This stands in for a real photo in the prototype so we never handle a real person's
// image. In the native app, this is replaced by the (locally stored) student photo.

window.NameDeck = window.NameDeck || {};

(function () {
  // Simple deterministic string hash -> 32-bit int.
  function hash(str) {
    let h = 2166136261;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  // Seeded pseudo-random generator (mulberry32).
  function rng(seedInt) {
    let a = seedInt;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const BG        = ['#5B8DEF', '#EF7A5B', '#3FB68B', '#B65BEF', '#EFC15B', '#5BC7EF', '#EF5B9C', '#7A8B99'];
  const SKIN      = ['#F2D3B3', '#E5B98E', '#C68642', '#8D5524', '#5C3A21', '#FFE0BD'];
  const HAIR      = ['#2B2B2B', '#4A2E19', '#7A4B1E', '#B8860B', '#8B0000', '#D9D9D9', '#1A1A1A'];
  const pick = (arr, r) => arr[Math.floor(r() * arr.length)];

  // Returns an SVG string for the given seed.
  NameDeck.avatar = function (seed, size) {
    size = size || 160;
    const r = rng(hash(seed));
    const bg = pick(BG, r);
    const skin = pick(SKIN, r);
    const hair = pick(HAIR, r);
    const hairStyle = Math.floor(r() * 4); // 0 short, 1 flat-top, 2 curly, 3 bald-ish
    const hasBeard = r() > 0.6;
    const eyeType = Math.floor(r() * 3);
    const browRaise = r() > 0.5 ? -2 : 0;

    // Face geometry (viewBox 100x100)
    const cx = 50, cy = 54, fr = 26; // face center + radius

    let hairSvg = '';
    if (hairStyle === 0) {
      hairSvg = `<path d="M24 46 Q50 8 76 46 Q76 30 50 24 Q24 30 24 46 Z" fill="${hair}"/>`;
    } else if (hairStyle === 1) {
      hairSvg = `<rect x="24" y="22" width="52" height="20" rx="6" fill="${hair}"/>`;
    } else if (hairStyle === 2) {
      hairSvg = `<g fill="${hair}">
        <circle cx="30" cy="34" r="9"/><circle cx="42" cy="26" r="10"/>
        <circle cx="58" cy="26" r="10"/><circle cx="70" cy="34" r="9"/>
        <circle cx="50" cy="24" r="10"/></g>`;
    } else {
      hairSvg = `<path d="M26 42 Q50 30 74 42 Q70 34 50 32 Q30 34 26 42 Z" fill="${hair}" opacity="0.9"/>`;
    }

    const beardSvg = hasBeard
      ? `<path d="M${cx-fr+4} ${cy+6} Q${cx} ${cy+fr+12} ${cx+fr-4} ${cy+6} Q${cx} ${cy+fr} ${cx-fr+4} ${cy+6} Z" fill="${hair}" opacity="0.85"/>`
      : '';

    let eyesSvg;
    if (eyeType === 0) {
      eyesSvg = `<circle cx="41" cy="52" r="3" fill="#222"/><circle cx="59" cy="52" r="3" fill="#222"/>`;
    } else if (eyeType === 1) {
      eyesSvg = `<rect x="38" y="50" width="7" height="4" rx="2" fill="#222"/><rect x="55" y="50" width="7" height="4" rx="2" fill="#222"/>`;
    } else {
      eyesSvg = `<path d="M38 52 Q41 49 44 52" stroke="#222" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                 <path d="M56 52 Q59 49 62 52" stroke="#222" stroke-width="2.4" fill="none" stroke-linecap="round"/>`;
    }

    const browsSvg = `<path d="M37 ${46+browRaise} q4 -2 8 0" stroke="${hair}" stroke-width="2" fill="none" stroke-linecap="round"/>
                      <path d="M55 ${46+browRaise} q4 -2 8 0" stroke="${hair}" stroke-width="2" fill="none" stroke-linecap="round"/>`;

    const smile = r() > 0.5;
    const mouthSvg = smile
      ? `<path d="M43 64 Q50 71 57 64" stroke="#7a3b2e" stroke-width="2.4" fill="none" stroke-linecap="round"/>`
      : `<path d="M44 66 L56 66" stroke="#7a3b2e" stroke-width="2.4" fill="none" stroke-linecap="round"/>`;

    return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="avatar">
      <defs><clipPath id="cl-${hash(seed)}"><rect width="100" height="100" rx="16"/></clipPath></defs>
      <g clip-path="url(#cl-${hash(seed)})">
        <rect width="100" height="100" fill="${bg}"/>
        <circle cx="${cx}" cy="88" r="34" fill="#ffffff" opacity="0.18"/>
        <circle cx="${cx}" cy="${cy}" r="${fr}" fill="${skin}"/>
        ${beardSvg}
        <ellipse cx="${cx-fr+2}" cy="${cy+2}" rx="4" ry="6" fill="${skin}"/>
        <ellipse cx="${cx+fr-2}" cy="${cy+2}" rx="4" ry="6" fill="${skin}"/>
        ${hairSvg}
        ${browsSvg}
        ${eyesSvg}
        ${mouthSvg}
      </g>
    </svg>`;
  };
})();


/* ===== src/core/leitner.js ===== */
// leitner.js — spaced-repetition scheduler (Leitner box system).
//
// PORTABLE CORE LOGIC. No UI, no DOM, no platform APIs. Pure functions over plain
// data. This translates to Swift almost line-for-line for the native app.
//
// Model: every card sits in a "box" 1..5. Correct answers promote it up a box;
// wrong answers send it back to box 1. Lower boxes are shown far more often, so the
// names you struggle with resurface frequently and the ones you know recede.
// "Mastered" = reached box 5.

window.NameDeck = window.NameDeck || {};

(function () {
  const MAX_BOX = 5;
  // Relative frequency weight per box. Box 1 shows ~8x as often as box 5.
  const BOX_WEIGHT = { 1: 8, 2: 5, 3: 3, 4: 2, 5: 1 };

  // Build initial state from a list of ids. Every card starts in box 1.
  function createDeck(ids) {
    const cards = {};
    ids.forEach(function (id) {
      cards[id] = { id: id, box: 1, seen: 0, correct: 0, streak: 0 };
    });
    return { cards: cards, lastId: null };
  }

  // Record an answer and return the (mutated) state.
  function recordAnswer(state, id, wasCorrect) {
    const c = state.cards[id];
    if (!c) return state;
    c.seen += 1;
    if (wasCorrect) {
      c.correct += 1;
      c.streak += 1;
      c.box = Math.min(MAX_BOX, c.box + 1);
    } else {
      c.streak = 0;
      c.box = 1;
    }
    return state;
  }

  // Weighted-random pick of the next card. Avoids repeating the immediately previous
  // card when possible so you don't get the same name twice in a row.
  function pickNext(state) {
    const entries = Object.values(state.cards);
    if (entries.length === 0) return null;

    const eligible = entries.filter(function (c) {
      return entries.length === 1 || c.id !== state.lastId;
    });

    let total = 0;
    eligible.forEach(function (c) { total += BOX_WEIGHT[c.box]; });

    let roll = Math.random() * total;
    let chosen = eligible[eligible.length - 1];
    for (let i = 0; i < eligible.length; i++) {
      roll -= BOX_WEIGHT[eligible[i].box];
      if (roll <= 0) { chosen = eligible[i]; break; }
    }
    state.lastId = chosen.id;
    return chosen.id;
  }

  // Progress summary for the whole deck.
  function progress(state) {
    const entries = Object.values(state.cards);
    const total = entries.length;
    const mastered = entries.filter(function (c) { return c.box >= MAX_BOX; }).length;
    const learning = entries.filter(function (c) { return c.box > 1 && c.box < MAX_BOX; }).length;
    const fresh = entries.filter(function (c) { return c.box === 1; }).length;
    return { total: total, mastered: mastered, learning: learning, fresh: fresh };
  }

  NameDeck.leitner = {
    MAX_BOX: MAX_BOX,
    createDeck: createDeck,
    recordAnswer: recordAnswer,
    pickNext: pickNext,
    progress: progress,
  };
})();


/* ===== src/core/nameMatch.js ===== */
// nameMatch.js — fuzzy matching of a typed guess against the correct name.
//
// PORTABLE CORE LOGIC. Pure functions, no UI. Translates directly to Swift.
//
// Goal: forgive small typos and missing accents (so a teacher isn't punished for not
// knowing how to type "Léo"), while still teaching the exact spelling — the caller is
// expected to always reveal the canonical spelling after a guess.

window.NameDeck = window.NameDeck || {};

(function () {
  // Lowercase, strip diacritics, collapse whitespace, drop punctuation/hyphens.
  function normalize(s) {
    return (s || '')
      .normalize('NFD')                 // split accented chars into base + mark
      .replace(/[\u0300-\u036f]/g, '')  // remove the combining marks
      .toLowerCase()
      .replace(/[^a-z0-9\s]/g, ' ')     // punctuation/hyphens -> space
      .replace(/\s+/g, ' ')
      .trim();
  }

  // Standard Levenshtein edit distance.
  function levenshtein(a, b) {
    if (a === b) return 0;
    if (!a.length) return b.length;
    if (!b.length) return a.length;
    let prev = [];
    for (let j = 0; j <= b.length; j++) prev[j] = j;
    for (let i = 1; i <= a.length; i++) {
      let cur = [i];
      for (let j = 1; j <= b.length; j++) {
        const cost = a[i - 1] === b[j - 1] ? 0 : 1;
        cur[j] = Math.min(prev[j] + 1, cur[j - 1] + 1, prev[j - 1] + cost);
      }
      prev = cur;
    }
    return prev[b.length];
  }

  // Allowed edit distance scales gently with word length.
  function tolerance(len) {
    if (len <= 4) return 1;
    if (len <= 8) return 2;
    return 3;
  }

  // Result: { correct, exact, distance }.
  //   exact   -> matched the canonical spelling including accents
  //   correct -> close enough to count as right (typo/accent forgiven)
  function check(guess, canonicalName) {
    const rawGuess = (guess || '').trim();
    const exact = rawGuess === canonicalName.trim();

    const g = normalize(guess);
    const target = normalize(canonicalName);
    if (!g) return { correct: false, exact: false, distance: Infinity };

    // Compare against the full name and also just the first token (many teachers will
    // type only the first name).
    const targetFirst = target.split(' ')[0];
    const dFull = levenshtein(g, target);
    const dFirst = levenshtein(g, targetFirst);
    const distance = Math.min(dFull, dFirst);

    const correct =
      distance === 0 ||
      dFull <= tolerance(target.length) ||
      dFirst <= tolerance(targetFirst.length);

    return { correct: correct, exact: exact, distance: distance };
  }

  NameDeck.nameMatch = {
    normalize: normalize,
    levenshtein: levenshtein,
    check: check,
  };
})();


/* ===== src/core/quiz.js ===== */
// quiz.js — multiple-choice question generation.
//
// PORTABLE CORE LOGIC. Pure functions, no UI.
//
// Builds a set of answer options for a card: the correct name plus plausible
// distractors. Distractors prefer players in the SAME position (harder, more useful
// practice) and fall back to any other player.

window.NameDeck = window.NameDeck || {};

(function () {
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // roster: full array of players. correctId: the answer. count: total options.
  // Returns an array of player objects (length up to `count`), shuffled.
  function multipleChoice(roster, correctId, count) {
    count = count || 4;
    const correct = roster.find(function (p) { return p.id === correctId; });
    if (!correct) return [];

    const others = roster.filter(function (p) { return p.id !== correctId; });
    const samePos = shuffle(others.filter(function (p) { return p.position === correct.position; }));
    const rest = shuffle(others.filter(function (p) { return p.position !== correct.position; }));

    const distractors = samePos.concat(rest).slice(0, count - 1);
    return shuffle([correct].concat(distractors));
  }

  NameDeck.quiz = {
    multipleChoice: multipleChoice,
    shuffle: shuffle,
  };
})();


/* ===== src/ui/app.js ===== */
// app.js — UI controller (WEB-ONLY; rewritten in SwiftUI for the native app).
// Drives the DOM using the portable NameDeck core modules. State is in-memory only
// (no persistence in the prototype — a deliberate choice; the real app stores locally
// and encrypted on device).

(function () {
  const ND = window.NameDeck;
  const roster = ND.roster;
  const $ = function (sel) { return document.querySelector(sel); };
  const el = function (tag, cls, html) {
    const n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  };
  const byId = function (id) { return roster.find(function (p) { return p.id === id; }); };

  let deck = ND.leitner.createDeck(roster.map(function (p) { return p.id; }));
  let session = { asked: 0, right: 0 };
  const app = $('#app');

  function renderProgressBar() {
    const p = ND.leitner.progress(deck);
    const pct = Math.round((p.mastered / p.total) * 100);
    return `<div class="progress">
      <div class="progress-head">
        <span>You know <b>${p.mastered}</b> of <b>${p.total}</b></span>
        <span class="muted">${pct}%</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="legend">
        <span><i class="dot fresh"></i>${p.fresh} new</span>
        <span><i class="dot learning"></i>${p.learning} learning</span>
        <span><i class="dot mastered"></i>${p.mastered} mastered</span>
      </div>
    </div>`;
  }

  // ---------- Home ----------
  function home() {
    app.innerHTML = '';
    const wrap = el('div', 'screen');
    wrap.innerHTML = `
      <div class="brand">NameDeck</div>
      <div class="subtitle">Learn your roster before day one</div>
      ${renderProgressBar()}
      <div class="modes">
        <button class="mode" data-mode="study"><span class="mode-emoji">🃏</span>
          <span class="mode-title">Study</span><span class="mode-sub">Flip cards, no pressure</span></button>
        <button class="mode" data-mode="mc"><span class="mode-emoji">🔤</span>
          <span class="mode-title">Multiple choice</span><span class="mode-sub">Pick the name</span></button>
        <button class="mode" data-mode="type"><span class="mode-emoji">⌨️</span>
          <span class="mode-title">Type the name</span><span class="mode-sub">Spelling counts (accents forgiven)</span></button>
        <button class="mode" data-mode="roster"><span class="mode-emoji">📋</span>
          <span class="mode-title">Browse roster</span><span class="mode-sub">See everyone</span></button>
      </div>
      <button class="reset" data-mode="reset">Reset progress</button>
      <div class="footer">Sample data · Real app keeps photos on-device · No facial recognition</div>
    `;
    wrap.querySelectorAll('[data-mode]').forEach(function (b) {
      b.addEventListener('click', function () {
        const m = b.getAttribute('data-mode');
        if (m === 'study') startStudy();
        else if (m === 'mc') startMC();
        else if (m === 'type') startType();
        else if (m === 'roster') browse();
        else if (m === 'reset') { deck = ND.leitner.createDeck(roster.map(function (p) { return p.id; })); home(); }
      });
    });
    app.appendChild(wrap);
  }

  function topBar(title) {
    const bar = el('div', 'topbar');
    bar.innerHTML = `<button class="back">‹ Back</button><span class="topbar-title">${title}</span><span class="topbar-count"></span>`;
    bar.querySelector('.back').addEventListener('click', home);
    return bar;
  }

  function avatarNode(seed) {
    const box = el('div', 'avatar');
    box.innerHTML = ND.avatar(seed, 200);
    return box;
  }

  // ---------- Study ----------
  function startStudy() {
    app.innerHTML = '';
    const screen = el('div', 'screen');
    screen.appendChild(topBar('Study'));
    const card = el('div', 'card');
    screen.appendChild(card);
    app.appendChild(screen);

    function show() {
      const id = ND.leitner.pickNext(deck);
      const p = byId(id);
      card.innerHTML = '';
      card.appendChild(avatarNode(p.avatarSeed));
      const revealBtn = el('button', 'reveal', 'Tap to reveal');
      const answer = el('div', 'answer hidden');
      answer.innerHTML = `<div class="name">${p.preferredName}</div>
        <div class="phonetic">${p.phonetic ? '“' + p.phonetic + '”' : ''}</div>
        <div class="meta">#${p.number} · ${p.position} · ${p.legalName}</div>`;
      card.appendChild(revealBtn);
      card.appendChild(answer);

      revealBtn.addEventListener('click', function () {
        revealBtn.classList.add('hidden');
        answer.classList.remove('hidden');
        const rate = el('div', 'rate');
        rate.innerHTML = `<button class="btn bad">Didn't know</button><button class="btn good">Knew it</button>`;
        card.appendChild(rate);
        rate.querySelector('.good').addEventListener('click', function () { ND.leitner.recordAnswer(deck, id, true); show(); });
        rate.querySelector('.bad').addEventListener('click', function () { ND.leitner.recordAnswer(deck, id, false); show(); });
      });
    }
    show();
  }

  // ---------- Multiple choice ----------
  function startMC() {
    session = { asked: 0, right: 0 };
    app.innerHTML = '';
    const screen = el('div', 'screen');
    screen.appendChild(topBar('Multiple choice'));
    const card = el('div', 'card');
    screen.appendChild(card);
    app.appendChild(screen);

    function show() {
      const id = ND.leitner.pickNext(deck);
      const p = byId(id);
      const options = ND.quiz.multipleChoice(roster, id, 4);
      card.innerHTML = '';
      card.appendChild(avatarNode(p.avatarSeed));
      const opts = el('div', 'options');
      options.forEach(function (opt) {
        const b = el('button', 'opt', opt.preferredName);
        b.addEventListener('click', function () {
          const correct = opt.id === id;
          session.asked++; if (correct) session.right++;
          ND.leitner.recordAnswer(deck, id, correct);
          opts.querySelectorAll('.opt').forEach(function (x) { x.disabled = true; });
          b.classList.add(correct ? 'correct' : 'wrong');
          if (!correct) {
            opts.querySelectorAll('.opt').forEach(function (x) {
              if (x.textContent === p.preferredName) x.classList.add('correct');
            });
          }
          setTimeout(show, correct ? 550 : 1100);
        });
        opts.appendChild(b);
      });
      card.appendChild(opts);
      screen.querySelector('.topbar-count').textContent = session.asked ? session.right + '/' + session.asked : '';
    }
    show();
  }

  // ---------- Type the name ----------
  function startType() {
    session = { asked: 0, right: 0 };
    app.innerHTML = '';
    const screen = el('div', 'screen');
    screen.appendChild(topBar('Type the name'));
    const card = el('div', 'card');
    screen.appendChild(card);
    app.appendChild(screen);

    function show() {
      const id = ND.leitner.pickNext(deck);
      const p = byId(id);
      card.innerHTML = '';
      card.appendChild(avatarNode(p.avatarSeed));
      const form = el('div', 'typeform');
      form.innerHTML = `<input class="nameinput" type="text" placeholder="Their name…" autocomplete="off" autocapitalize="words" />
        <button class="btn submit">Check</button>
        <div class="feedback"></div>`;
      card.appendChild(form);
      const input = form.querySelector('.nameinput');
      const fb = form.querySelector('.feedback');
      input.focus();

      function submit() {
        const res = ND.nameMatch.check(input.value, p.preferredName);
        session.asked++; if (res.correct) session.right++;
        ND.leitner.recordAnswer(deck, id, res.correct);
        input.disabled = true;
        form.querySelector('.submit').disabled = true;
        if (res.correct && res.exact) {
          fb.innerHTML = `<span class="ok">✓ ${p.preferredName}</span>`;
        } else if (res.correct) {
          fb.innerHTML = `<span class="ok">✓ Close! It's spelled <b>${p.preferredName}</b></span>` +
            (p.phonetic ? `<div class="phonetic">“${p.phonetic}”</div>` : '');
        } else {
          fb.innerHTML = `<span class="no">✗ It's <b>${p.preferredName}</b></span>` +
            (p.phonetic ? `<div class="phonetic">“${p.phonetic}”</div>` : '');
        }
        const next = el('button', 'btn next', 'Next →');
        next.addEventListener('click', show);
        fb.appendChild(next);
        screen.querySelector('.topbar-count').textContent = session.right + '/' + session.asked;
      }
      form.querySelector('.submit').addEventListener('click', submit);
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
    }
    show();
  }

  // ---------- Browse roster ----------
  function browse() {
    app.innerHTML = '';
    const screen = el('div', 'screen');
    screen.appendChild(topBar('Roster'));
    const grid = el('div', 'grid');
    roster.forEach(function (p) {
      const c = el('div', 'grid-card');
      c.innerHTML = ND.avatar(p.avatarSeed, 96) +
        `<div class="grid-name">${p.preferredName}</div>
         <div class="grid-meta">#${p.number} · ${p.position}</div>`;
      grid.appendChild(c);
    });
    screen.appendChild(grid);
    app.appendChild(screen);
  }

  home();
})();

  </script>
</body>
</html>
